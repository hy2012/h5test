<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面加载时间测试 - H5 测试工具</title>
    <link rel="stylesheet" href="../common/style.css">
    <script src="../common/utils.js"></script>
    <script src="../common/nav.js"></script>
    <script>
        window.startDate = Date.now();
        console.log("Load script started at: " + window.startDate);
        
        // 模拟阻塞 2 秒，用于测试加载时间
        console.log("Simulating 2s block...");
        sleep(2000);
    </script>

    <!-- 引入外部资源测试加载 -->
    <link async rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <script async src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script async src="https://static.zhihu.com/heifetz/mobile.common.14514a86425aa98a5fa2.js"></script>
</head>

<body>
    <h1>页面加载时间测试</h1>
    <p>该页面通过脚本阻塞 2 秒来测试 <code>DOMContentLoaded</code> 和 <code>onload</code> 事件的触发时间。</p>
    
    <div id="log-container" style="margin-top: 20px; font-family: monospace; background: #222; color: #0f0; padding: 15px; border-radius: 4px; line-height: 1.4;">
        <div>[System] 正在记录加载事件...</div>
    </div>

    <script type="text/javascript">
        var logContainer = document.getElementById('log-container');
        
        function uiLog(tag) {
            var time = Date.now();
            var dur = time - window.startDate;
            var msg = "Event: " + tag + " | Time: " + time + " | Duration: " + dur + "ms";
            console.log(msg);
            
            var div = document.createElement('div');
            div.textContent = "> " + msg;
            logContainer.appendChild(div);
        }

        document.addEventListener("DOMContentLoaded", function () {
            uiLog("DOMContentLoaded");
        });

        document.addEventListener("readystatechange", function () {
            uiLog("readystatechange-" + document.readyState);
        });

        window.onload = function () {
            uiLog("onload");
        };
    </script>
</body>

</html>
